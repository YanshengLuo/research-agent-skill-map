name: Link check

on:
  push:
    branches:
      - main
    paths:
      - "**/*.md"
      - ".github/workflows/links.yml"
  pull_request:
    paths:
      - "**/*.md"
      - ".github/workflows/links.yml"
  workflow_dispatch:
  schedule:
    - cron: "17 7 1 * *"

permissions:
  contents: read

concurrency:
  group: links-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.1

      - name: Check Markdown links
        uses: lycheeverse/lychee-action@v2.9.0
        with:
          args: >-
            --no-progress
            --max-retries 3
            --timeout 20
            './**/*.md'
          fail: true
          jobSummary: true
