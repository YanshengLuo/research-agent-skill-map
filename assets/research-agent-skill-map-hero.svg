    <path d="M617 210 C677 210 674 103 742 103 S811 210 866 210 S937 102 1000 102" stroke="url(#route)" stroke-width="3"/>
    <path d="M617 210 C678 210 680 318 746 318 S817 210 866 210 S941 318 1006 318" stroke="#334155" stroke-width="18" opacity="0.32"/>
    <path d="M617 210 C678 210 680 318 746 318 S817 210 866 210 S941 318 1006 318" stroke="url(#route)" stroke-width="3"/>
    <path d="M866 210 H1125" stroke="url(#route)" stroke-width="3"/>
  </g>

  <g filter="url(#glow)">
