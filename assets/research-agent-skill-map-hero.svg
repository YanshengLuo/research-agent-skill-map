<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Research Agent Skill Map</title>
  <desc id="desc">A technical map connecting evidence, computation, scientific writing, and AI nodes.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08111f"/>
      <stop offset="1" stop-color="#17213a"/>
    </linearGradient>
    <linearGradient id="route" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.52" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#94a3b8" stroke-opacity="0.07"/>
    </pattern>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="420" rx="24" fill="url(#background)"/>
  <rect width="1200" height="420" rx="24" fill="url(#grid)"/>
  <circle cx="1090" cy="52" r="120" fill="#7c3aed" opacity="0.08"/>
  <circle cx="705" cy="402" r="155" fill="#0891b2" opacity="0.07"/>

  <g font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="72" y="145" fill="#93c5fd" font-size="18" font-weight="650" letter-spacing="3">OPEN-SOURCE DECISION GUIDE</text>
    <text x="70" y="207" fill="#f8fafc" font-size="54" font-weight="750" letter-spacing="-1.5">Research Agent</text>
    <text x="70" y="267" fill="#f8fafc" font-size="54" font-weight="750" letter-spacing="-1.5">Skill Map</text>
    <text x="72" y="318" fill="#cbd5e1" font-size="21">Choose the right research-agent toolkit for the task</text>
  </g>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
